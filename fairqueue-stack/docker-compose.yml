services:
  postgres:
    image: postgres:16-alpine
    container_name: fq_postgres
    environment:
      POSTGRES_USER: fairqueue
      POSTGRES_PASSWORD: fairqueue
      POSTGRES_DB: fairqueue
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fairqueue']
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fq_redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: fq_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://fairqueue:fairqueue@postgres:5432/fairqueue
      REDIS_URL: redis://redis:6379/0
      ADMISSION_BATCH: '5'
      ADMISSION_INTERVAL_MS: '4000'
      LOCK_TTL_SECONDS: '90'
      MAX_ADMITTED_PER_TRAIN: '20'
      RATE_LIMIT_MAX: '30'
      RATE_LIMIT_WINDOW_SEC: '10'
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code

  frontend:
    build: ./frontend
    container_name: fq_frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_WS_BASE: ws://localhost:8000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    command: yarn dev
    volumes:
      - ./frontend:/code
      - /code/node_modules

  locust:
    image: locustio/locust:2.29.1
    container_name: fq_locust
    ports:
      - '8089:8089'
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://backend:8000
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
